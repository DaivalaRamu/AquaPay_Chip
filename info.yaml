project:
  title: "AquaPay Chip"
  author: "Ramu"
  description: "A simple digital chip for AquaPay logic demonstration"
  language: "Verilog"
  clock_hz: 1000000

  source_files:
    - "src/top.v"

  top_module: "top"

  pinout:
    ui[0]: "Input 0"
    ui[1]: "Input 1"
    ui[2]: "Input 2"
    ui[3]: "Input 3"
    ui[4]: "Input 4"
    ui[5]: "Input 5"
    ui[6]: "Input 6"
    ui[7]: "Input 7"

    uo[0]: "Output 0"
    uo[1]: "Output 1"
    uo[2]: "Output 2"
    uo[3]: "Output 3"
    uo[4]: "Output 4"
    uo[5]: "Output 5"
    uo[6]: "Output 6"
    uo[7]: "Output 7"

    uio[0]: "Bidirectional 0"
    uio[1]: "Bidirectional 1"
    uio[2]: "Bidirectional 2"
    uio[3]: "Bidirectional 3"
    uio[4]: "Bidirectional 4"
    uio[5]: "Bidirectional 5"
    uio[6]: "Bidirectional 6"
    uio[7]: "Bidirectional 7"
